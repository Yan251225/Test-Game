<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="cb-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="50%" stop-color="#b0d8f0"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
  </defs>
  <!-- 天空 -->
  <rect width="1200" height="800" fill="url(#cb-sky)"/>
  <!-- 云 -->
  <g opacity="0.6" fill="#fff">
    <ellipse cx="300" cy="100" rx="120" ry="40"/>
    <ellipse cx="370" cy="90" rx="80" ry="30"/>
    <ellipse cx="900" cy="120" rx="100" ry="35"/>
  </g>
  <!-- 草地 -->
  <rect x="0" y="480" width="1200" height="320" fill="#7ab87a"/>
  <rect x="0" y="480" width="1200" height="15" fill="#6aa86a"/>
  <!-- 道路 -->
  <path d="M0,550 Q300,530 600,550 Q900,530 1200,550 L1200,600 Q900,580 600,600 Q300,580 0,600 Z" fill="#d4c4a8"/>
  <!-- 樱花树 1（大·左） -->
  <g>
    <rect x="180" y="320" width="20" height="180" fill="#8B6946"/>
    <path d="M190,320 Q120,300 100,280" fill="none" stroke="#7a5836" stroke-width="6"/>
    <path d="M190,340 Q250,310 280,290" fill="none" stroke="#7a5836" stroke-width="5"/>
    <ellipse cx="190" cy="260" rx="100" ry="90" fill="#FFB7C5"/>
    <ellipse cx="130" cy="280" rx="60" ry="50" fill="#ffc0cb"/>
    <ellipse cx="260" cy="270" rx="55" ry="45" fill="#ffafc0"/>
    <ellipse cx="190" cy="210" rx="50" ry="40" fill="#ffd0d8"/>
    <ellipse cx="100" cy="260" rx="40" ry="35" fill="#ffa8b8"/>
    <ellipse cx="280" cy="250" rx="35" ry="30" fill="#ffa8b8"/>
  </g>
  <!-- 樱花树 2（大·右） -->
  <g>
    <rect x="900" y="300" width="22" height="200" fill="#8B6946"/>
    <path d="M910,300 Q840,280 820,260" fill="none" stroke="#7a5836" stroke-width="6"/>
    <path d="M910,320 Q970,290 1000,270" fill="none" stroke="#7a5836" stroke-width="5"/>
    <ellipse cx="910" cy="240" rx="110" ry="95" fill="#FFB7C5"/>
    <ellipse cx="840" cy="260" rx="60" ry="50" fill="#ffc0cb"/>
    <ellipse cx="990" cy="250" rx="55" ry="45" fill="#ffafc0"/>
    <ellipse cx="910" cy="190" rx="55" ry="45" fill="#ffd0d8"/>
  </g>
  <!-- 樱花树 3（中·远景） -->
  <g opacity="0.6">
    <rect x="550" y="360" width="15" height="130" fill="#9a7956"/>
    <ellipse cx="557" cy="330" rx="65" ry="55" fill="#FFB7C5"/>
    <ellipse cx="530" cy="340" rx="35" ry="30" fill="#ffc0cb"/>
    <ellipse cx="585" cy="335" rx="30" ry="28" fill="#ffafc0"/>
