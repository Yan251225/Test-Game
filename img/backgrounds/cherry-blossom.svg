  <!-- 大量花瓣飘落 -->
  <g fill="#FFB7C5">
    <ellipse cx="150" cy="380" rx="5" ry="3" transform="rotate(30,150,380)" opacity="0.8"/>
    <ellipse cx="250" cy="420" rx="4" ry="2.5" transform="rotate(-20,250,420)" opacity="0.7"/>
    <ellipse cx="350" cy="350" rx="5" ry="3" transform="rotate(45,350,350)" opacity="0.6"/>
    <ellipse cx="450" cy="400" rx="4" ry="2" transform="rotate(60,450,400)" opacity="0.8"/>
    <ellipse cx="550" cy="300" rx="5" ry="3" transform="rotate(-10,550,300)" opacity="0.7"/>
    <ellipse cx="650" cy="450" rx="4" ry="2.5" transform="rotate(35,650,450)" opacity="0.6"/>
    <ellipse cx="750" cy="350" rx="5" ry="3" transform="rotate(-40,750,350)" opacity="0.8"/>
    <ellipse cx="850" cy="420" rx="4" ry="2" transform="rotate(20,850,420)" opacity="0.7"/>
    <ellipse cx="950" cy="370" rx="5" ry="3" transform="rotate(50,950,370)" opacity="0.6"/>
    <ellipse cx="1050" cy="400" rx="4" ry="2.5" transform="rotate(-25,1050,400)" opacity="0.8"/>
    <ellipse cx="100" cy="450" rx="4" ry="2" transform="rotate(15,100,450)" opacity="0.5"/>
    <ellipse cx="300" cy="480" rx="5" ry="3" transform="rotate(-35,300,480)" opacity="0.5"/>
    <ellipse cx="500" cy="460" rx="4" ry="2.5" transform="rotate(40,500,460)" opacity="0.5"/>
    <ellipse cx="700" cy="490" rx="5" ry="3" transform="rotate(-15,700,490)" opacity="0.4"/>
    <ellipse cx="1100" cy="470" rx="4" ry="2" transform="rotate(25,1100,470)" opacity="0.5"/>
    <ellipse cx="200" cy="250" rx="4" ry="2" transform="rotate(55,200,250)" opacity="0.6"/>
    <ellipse cx="400" cy="280" rx="3" ry="2" transform="rotate(-30,400,280)" opacity="0.5"/>
    <ellipse cx="800" cy="300" rx="4" ry="2.5" transform="rotate(10,800,300)" opacity="0.6"/>
    <ellipse cx="1000" cy="280" rx="3" ry="2" transform="rotate(-45,1000,280)" opacity="0.5"/>
    <ellipse cx="600" cy="200" rx="4" ry="2" transform="rotate(30,600,200)" opacity="0.4"/>
  </g>
  <!-- 长椅 -->
  <rect x="420" y="510" width="120" height="12" rx="3" fill="#8B6946"/>
  <rect x="430" y="522" width="8" height="25" fill="#7a5836"/>
  <rect x="522" y="522" width="8" height="25" fill="#7a5836"/>
  <rect x="420" y="505" width="120" height="8" rx="3" fill="#9a7956"/>
