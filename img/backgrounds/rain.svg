<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="rain-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="50%" stop-color="#606c88"/>
      <stop offset="100%" stop-color="#718096"/>
    </linearGradient>
  </defs>
  <!-- 阴天 -->
  <rect width="1200" height="800" fill="url(#rain-sky)"/>
  <!-- 厚云层 -->
  <g fill="#5a6678" opacity="0.8">
    <ellipse cx="200" cy="80" rx="200" ry="60"/>
    <ellipse cx="500" cy="60" rx="250" ry="70"/>
    <ellipse cx="800" cy="70" rx="200" ry="55"/>
    <ellipse cx="1100" cy="80" rx="180" ry="60"/>
    <ellipse cx="350" cy="120" rx="180" ry="50"/>
    <ellipse cx="700" cy="110" rx="220" ry="55"/>
    <ellipse cx="1000" cy="120" rx="200" ry="50"/>
  </g>
  <!-- 校门远景（雨中朦胧） -->
