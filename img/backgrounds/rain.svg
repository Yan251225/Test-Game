    <line x1="350" y1="220" x2="345" y2="280"/>
    <line x1="450" y1="190" x2="445" y2="250"/>
    <line x1="550" y1="230" x2="545" y2="290"/>
    <line x1="650" y1="200" x2="645" y2="260"/>
    <line x1="750" y1="210" x2="745" y2="270"/>
    <line x1="850" y1="190" x2="845" y2="250"/>
    <line x1="950" y1="220" x2="945" y2="280"/>
    <line x1="1050" y1="200" x2="1045" y2="260"/>
    <line x1="80" y1="300" x2="75" y2="360"/>
    <line x1="180" y1="320" x2="175" y2="380"/>
    <line x1="330" y1="300" x2="325" y2="360"/>
    <line x1="480" y1="330" x2="475" y2="390"/>
    <line x1="620" y1="310" x2="615" y2="370"/>
    <line x1="770" y1="300" x2="765" y2="360"/>
    <line x1="880" y1="320" x2="875" y2="380"/>
    <line x1="1020" y1="310" x2="1015" y2="370"/>
    <line x1="1150" y1="300" x2="1145" y2="360"/>
    <line x1="120" y1="400" x2="115" y2="460"/>
    <line x1="270" y1="420" x2="265" y2="480"/>
