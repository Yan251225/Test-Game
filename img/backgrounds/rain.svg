    <rect x="400" y="350" width="400" height="200" fill="#8a8a8a" rx="5"/>
    <rect x="450" y="300" width="30" height="250" fill="#999"/>
    <rect x="720" y="300" width="30" height="250" fill="#999"/>
  </g>
  <!-- 地面积水 -->
  <rect x="0" y="550" width="1200" height="250" fill="#5a6878"/>
